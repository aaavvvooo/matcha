name: Deploy

on:
  push:
    branches: [main]

env:
  GCP_REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev
  IMAGE: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/matcha/backend

jobs:
  # ── Detect which service changed ────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'

  # ── Frontend → Vercel ────────────────────────────────────────────
  deploy-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        run: npx vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: ./frontend
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ── Backend → Cloud Run ──────────────────────────────────────────
  deploy-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build and push image
        run: |
          docker build \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest \
            ./backend
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: matcha-backend
          region: ${{ env.GCP_REGION }}
          image: ${{ env.IMAGE }}:${{ github.sha }}
          flags: >-
            --min-instances=0
            --max-instances=2
            --memory=512Mi
            --cpu=1
            --timeout=300
            --concurrency=80
            --allow-unauthenticated
            --service-account=${{ secrets.GCP_SERVICE_ACCOUNT }}
          env_vars: |
            DATABASE_URL=${{ secrets.DATABASE_URL }},
            REDIS_URL=${{ secrets.REDIS_URL }},
            JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }},
            BREVO_API_KEY=${{ secrets.BREVO_API_KEY }},
            FROM_EMAIL=${{ secrets.FROM_EMAIL }},
            FRONTEND_URL=${{ secrets.FRONTEND_URL }},
            GCS_BUCKET_NAME=${{ secrets.GCS_BUCKET_NAME }},
            GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}

  # ── Celery Worker → e2-micro ─────────────────────────────────────
  deploy-celery:
    needs: [changes, deploy-backend]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Pull latest code and restart worker
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd /opt/matcha
            git pull origin main
            cd backend && uv sync --frozen --no-dev
            sudo systemctl restart matcha-celery
            sleep 3
            sudo systemctl is-active matcha-celery
